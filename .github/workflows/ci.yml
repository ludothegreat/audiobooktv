name: ci

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: ./gradlew check + assembleRelease
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;34.0.0

      - name: Cache Gradle wrapper + caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run gradle check (spotless + detekt + lint + unit tests)
        run: ./gradlew --no-configuration-cache check

      # Sideload-only project: release APK is signed with the Android debug key
      # so anyone with gradle can build a working install without secret
      # management (decision #3). Don't add a release keystore here.
      - name: Assemble release APK
        run: ./gradlew --no-configuration-cache assembleRelease

      - name: Upload release APK as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: audiobooktv-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload test + lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: warn
          retention-days: 7
